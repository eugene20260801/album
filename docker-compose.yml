services:
  frontend:
    build: ./album-frontend
    container_name: nextjs_app
    ports:
      - "3000:3000"
    volumes:
      - ./album-frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./album-backend
    container_name: express_api
    ports:
      - "4000:4000"
    volumes:
      - ./album-backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DB_HOST=db          # Point backend to PostgreSQL service
      - DB_PORT=5432
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      - DB_NAME=mydb
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: