services:
  frontend:
    build: ./album-frontend
    container_name: nextjs_app
    ports:
      - "3000:3000"
    volumes:
      - ./album-frontend:/app          # Mount local frontend code
      - /app/node_modules             # Keep node_modules inside container
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./album-backend
    container_name: express_api
    ports:
      - "4000:4000"
    volumes:
      - ./album-backend:/app          # Mount local backend code
      - /app/node_modules             # Keep node_modules inside container
    environment:
      - NODE_ENV=development
    restart: unless-stopped